services:
  aetherbank:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: aetherbank:latest
    container_name: aetherbank
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      ENVIRONMENT: production
      DATABASE_URL: postgresql://aether:${DB_PASSWORD:-password}@localhost:5432/etheria_account
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
      SERVER_PORT: 8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_ENVIRONMENT: production
      CORS_ALLOWED_ORIGINS: https://bank.skygenesisenterprise.com,https://www.bank.skygenesisenterprise.com
    volumes:
      - ./logs:/app/logs
    working_dir: /app
    command: ["/entrypoint-cloud.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
